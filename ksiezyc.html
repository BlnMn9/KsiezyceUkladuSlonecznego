<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Wczytywanie...</title>
    
    <style>
        /* --- FRAGMENT CSS: SYSTEM ZMIENNYCH I BAZA --- */
        :root {
            --main-color: #38bdf8; /* Kolor nadpisywany przez JSON */
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        /* Sekcja Hero - Domyślny układ dla telefonów (jedno pod drugim) */
        .hero {
            display: flex;
            flex-direction: column; /* Ustawia zdjęcie nad tekstem */
            margin-bottom: 40px;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Zdjęcie na telefonie - pełna szerokość i idealny kwadrat */
        .hero-img {
            width: 100%;
            aspect-ratio: 1 / 1; /* Wymusza proporcje kwadratu, zapobiega ucinaniu */
            background-size: cover;
            background-position: center;
        }

        .hero-content {
            padding: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Układ obok siebie aktywowany dopiero na większych ekranach (komputery) */
        @media (min-width: 992px) {
            .hero {
                flex-direction: row; /* Przywraca układ lewo-prawo */
                gap: 40px;
            }
            .hero-img {
                width: 45%; /* Na komputerze zdjęcie zajmuje 45% szerokości */
                aspect-ratio: auto; /* Wyłącza wymuszony kwadrat */
                min-height: 100%; /* Rozciąga zdjęcie w dół, by dopasować się do bloku tekstu */
            }
        }


        .tag {
            color: var(--main-color);
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Siatka statystyk */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--main-color);
        }

        .stat-val { display: block; font-size: 1.2rem; font-weight: bold; }
        .stat-lbl { color: var(--text-muted); font-size: 0.85rem; }

        /* Dynamiczne sekcje */
        .section {
            margin-bottom: 40px;
            display: none; /* Domyślnie ukryte, JS pokaże jeśli będą dane */
        }

        .section-title {
            border-bottom: 1px solid var(--text-muted);
            padding-bottom: 10px;
            color: var(--main-color);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
        }

        /* Galeria */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .gallery img:hover { transform: scale(1.03); }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        
        <!-- NAGŁÓWEK / HERO -->
        <header class="hero">
            <div class="hero-img" id="moon-hero-img"></div>
            <div class="hero-content">
                <span class="tag" id="moon-tag"></span>
                <h1 id="moon-name" style="margin: 10px 0;"></h1>
                <p id="moon-desc" style="color: var(--text-muted); line-height: 1.6;"></p>
                
                <div class="stats-grid" id="moon-stats"></div>
            </div>
        </header>

        <!-- SEKCJA: PROFIL SZCZEGÓŁOWY -->
        <section class="section" id="sec-profile">
            <h2 class="section-title" id="title-profile"></h2>
            <div class="grid-2" id="content-profile"></div>
        </section>

        <!-- SEKCJA: ANOMALIE -->
        <section class="section" id="sec-anomalies">
            <h2 class="section-title" id="title-anomalies"></h2>
            <div class="grid-2" id="content-anomalies"></div>
        </section>

        <!-- SEKCJA: GALERIA -->
        <section class="section" id="sec-gallery">
            <h2 class="section-title" id="title-gallery"></h2>
            <div class="gallery" id="content-gallery"></div>
        </section>

    </div>

<!-- --- ZAKTUALIZOWANY FRAGMENT JS: MÓZG SYSTEMU --- -->
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const moonId = urlParams.get('id');

    if (!moonId) {
        document.body.innerHTML = "<h1>Błąd: Nie wybrano żadnego obiektu.</h1>";
    } else {
        fetch('moon.json')
            .then(res => res.json())
            .then(data => {
                const moon = data[moonId];
                if (!moon) {
                    document.body.innerHTML = "<h1>Obiekt nie istnieje w bazie danych.</h1>";
                    return;
                }

                renderPage(moon);
            })
            .catch(err => console.error("Błąd pobierania bazy JSON:", err));
    }

    function renderPage(data) {
        // 1. Motyw i Tytuł strony
        if (data.themeColor) document.documentElement.style.setProperty('--main-color', data.themeColor);
        document.title = data.name;
        document.getElementById('moon-name').innerText = data.name;
        document.getElementById('moon-tag').innerText = data.planetTag;
        document.getElementById('moon-desc').innerText = data.description;
        document.getElementById('moon-hero-img').style.backgroundImage = `url('${data.heroImage}')`;

        // 2. Szybkie Statystyki (Dostosowane do struktury tablicy obiektów w Twoim JSON)
        const statsContainer = document.getElementById('moon-stats');
        statsContainer.innerHTML = ''; 
        data.quickStats.forEach(stat => {
            statsContainer.innerHTML += `
                <div class="stat-box">
                    <span class="stat-val">${stat.value}</span>
                    <span class="stat-lbl">${stat.label}</span>
                </div>`;
        });

        // 3. Profil szczegółowy (Mapowanie na klucz "detailedProfile")
        renderFlexSection('sec-profile', 'title-profile', 'content-profile', 'Profil Szczegółowy', data.detailedProfile);

        // 4. Anomalie (Mapowanie na klucz "anomalies")
        renderFlexSection('sec-anomalies', 'title-anomalies', 'content-anomalies', 'Anomalie i Cechy Charakterystyczne', data.anomalies);

        // 5. Główna Galeria
        const secGallery = document.getElementById('sec-gallery');
        if (data.gallery && data.gallery.length > 0) {
            secGallery.style.display = 'block';
            document.getElementById('title-gallery').innerText = data.galleryTitle || "Galeria";
            const galContainer = document.getElementById('content-gallery');
            galContainer.innerHTML = '';
            data.gallery.forEach(imgUrl => {
                galContainer.innerHTML += `<img src="${imgUrl}" alt="Zdjęcie obiektu">`;
            });
        }

        // Płynne pokazanie gotowej strony
        document.getElementById('main-container').style.opacity = '1';
    }

    // Uniwersalna funkcja dopasowana do kluczy "title" i "content" z Twojego pliku JSON
    function renderFlexSection(sectionId, titleId, contentId, titleText, itemsArray) {
        const section = document.getElementById(sectionId);
        if (itemsArray && itemsArray.length > 0) {
            section.style.display = 'block';
            document.getElementById(titleId).innerText = titleText;
            const container = document.getElementById(contentId);
            container.innerHTML = '';
            
            itemsArray.forEach(item => {
                // Opcjonalne renderowanie mini-obrazków wewnątrz anomalii
                let subImagesHtml = '';
                if (item.images && item.images.length > 0) {
                    subImagesHtml = `<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 8px; margin-top: 12px;">`;
                    item.images.forEach(img => {
                        subImagesHtml += `<img src="${img}" style="width: 100%; height: 50px; object-fit: cover; border-radius: 4px;">`;
                    });
                    subImagesHtml += `</div>`;
                }

                container.innerHTML += `
                    <div class="card">
                        <h3>${item.title}</h3>
                        <p style="color: var(--text-muted); line-height: 1.5; margin-bottom: 0;">${item.content}</p>
                        ${subImagesHtml}
                    </div>`;
            });
        }
    }
</script>

</body>
</html>
