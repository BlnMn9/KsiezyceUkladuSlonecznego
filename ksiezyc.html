<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Wczytywanie...</title>
    
    <style>
        header {
    background: linear-gradient(180deg, #02050a 0%, #0b0f19 100%);
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid #1e293b;
    margin-bottom: 30px;
}
header h1 {
    font-size: 1.8rem;
    color: #38bdf8;
    letter-spacing: 2px;
}
.back-link {
    display: inline-block;
    margin-bottom: 20px;
    color: #38bdf8;
    text-decoration: none;
    font-size: 1.1rem;
    border: 1px solid #38bdf8;
    padding: 8px 16px;
    border-radius: 6px;
    transition: 0.3s;
}
.back-link:hover {
    background-color: #38bdf8;
    color: #0b0f19;
}
        
        :root {
            --main-color: #38bdf8; /* Kolor nadpisywany przez JSON */
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        /* Sekcja Hero - Domyślny układ dla telefonów (jedno pod drugim) */
        .hero {
            display: flex;
            flex-direction: column; /* Ustawia zdjęcie nad tekstem */
            margin-bottom: 40px;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Zdjęcie na telefonie - pełna szerokość i idealny kwadrat */
        .hero-img {
            width: 100%;
            aspect-ratio: 1 / 1; /* Wymusza proporcje kwadratu, zapobiega ucinaniu */
            background-size: cover;
            background-position: center;
        }

        .hero-content {
            padding: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Układ obok siebie aktywowany dopiero na większych ekranach (komputery) */
        @media (min-width: 992px) {
            .hero {
                flex-direction: row; /* Przywraca układ lewo-prawo */
                gap: 40px;
            }
            .hero-img {
                width: 45%; /* Na komputerze zdjęcie zajmuje 45% szerokości */
                aspect-ratio: auto; /* Wyłącza wymuszony kwadrat */
                min-height: 100%; /* Rozciąga zdjęcie w dół, by dopasować się do bloku tekstu */
            }
        }


        .tag {
            color: var(--main-color);
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Siatka statystyk */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--main-color);
        }

        .stat-val { display: block; font-size: 1.2rem; font-weight: bold; }
        .stat-lbl { color: var(--text-muted); font-size: 0.85rem; }

        /* Dynamiczne sekcje */
        .section {
            margin-bottom: 40px;
            display: none; /* Domyślnie ukryte, JS pokaże jeśli będą dane */
        }

        .section-title {
            border-bottom: 1px solid var(--text-muted);
            padding-bottom: 10px;
            color: var(--main-color);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
        }

        /* Galeria */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .gallery img:hover { transform: scale(1.03); }
    </style>
</head>
<body>
    <header>
        <h1>Księżyce Układu Słonecznego</h1>
    </header>

    <div class="container" id="main-container">
        
        <a href="index.html" class="back-link">&#10094; Wróć do listy księżyców</a>

        <section class="hero" id="moon-hero">
            <div class="hero-img" id="moon-hero-img"></div>
            <div class="hero-content">
                <span class="tag" id="moon-tag"></span>
                <h1 id="moon-name" style="margin: 10px 0;"></h1>
                <p id="moon-desc" style="color: var(--text-muted); line-height: 1.6;"></p>
                
                <div class="stats-grid" id="moon-stats"></div>
            </div>
        </section>

        <section class="section" id="sec-orbit">
            <h2 class="section-title">Wizualizacja Orbity</h2>
            <div class="grid-2" id="content-orbit-metrics"></div>
            <p id="content-orbit-summary" style="text-align: center; color: var(--text-muted); margin-top: 15px; font-size: 0.95rem;"></p>
        </section>

        <section class="section" id="sec-profile">
            <h2 class="section-title" id="title-profile"></h2>
            <div class="grid-2" id="content-profile"></div>
        </section>

        <section class="section" id="sec-astrobiology">
            <h2 class="section-title">Możliwość istnienia życia</h2>
            <div class="card">
                <div style="font-weight: bold; margin-bottom: 10px;">Potencjał astrobiologiczny: <span id="astro-stars" style="color: gold; letter-spacing: 2px;"></span></div>
                <p id="astro-desc" style="color: var(--text-muted); line-height: 1.5; margin: 0;"></p>
            </div>
        </section>

        <section class="section" id="sec-physical">
            <h2 class="section-title">Parametry fizyczne</h2>
            <div class="card">
                <table class="extended-table" style="width: 100%; border-collapse: collapse; text-align: left;">
                    <tbody id="content-physical"></tbody>
                </table>
            </div>
        </section>

        <section class="section" id="sec-geology">
            <h2 class="section-title">Geologia i Skład Chemiczny</h2>
            <div class="grid-2" id="content-geology-text"></div>
            
            <div class="card" style="margin-top: 20px;" id="content-geology-chart-container">
                <h4 id="geology-chart-title"></h4>
                <ul id="geology-chart-legend" style="list-style: none; padding: 0; line-height: 1.8;"></ul>
            </div>
        </section>

        <section class="section" id="sec-anomalies">
            <h2 class="section-title" id="title-anomalies"></h2>
            <div class="grid-2" id="content-anomalies"></div>
        </section>

        <section class="section" id="sec-comparison">
            <h2 class="section-title" id="title-comparison"></h2>
            <p id="subtitle-comparison" style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.95rem;"></p>
            <div id="content-comparison-items"></div>
            <div class="card" style="margin-top: 25px; border-left: 4px solid var(--main-color);">
                <p id="summary-comparison" style="margin: 0; line-height: 1.5; font-size: 0.9rem;"></p>
            </div>
        </section>

        <section class="section" id="sec-missions">
            <h2 class="section-title">Misje Kosmiczne</h2>
            <div class="grid-2" id="content-missions"></div>
        </section>

        <section class="section" id="sec-gallery">
            <h2 class="section-title" id="title-gallery"></h2>
            <div class="gallery" id="content-gallery"></div>
        </section>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const moonId = urlParams.get('id');

        if (!moonId) {
            document.body.innerHTML = "<h1 style='text-align:center; padding: 50px;'>Błąd: Nie wybrano żadnego obiektu.</h1>";
        } else {
            fetch('moon.json')
                .then(res => res.json())
                .then(data => {
                    const moon = data[moonId];
                    if (!moon) {
                        document.body.innerHTML = "<h1 style='text-align:center; padding: 50px;'>Obiekt nie istnieje w bazie danych.</h1>";
                        return;
                    }
                    renderPage(moon);
                })
                .catch(err => console.error("Błąd pobierania bazy JSON:", err));
        }

function renderPage(data) {
            // 1. Główne dane i Hero
            if (data.themeColor) document.documentElement.style.setProperty('--main-color', data.themeColor);
            document.title = data.name;
            document.getElementById('moon-name').innerText = data.name;
            document.getElementById('moon-tag').innerText = data.planetTag;
            document.getElementById('moon-desc').innerText = data.description;
            
            // POPRAWKA ZDJĘCIA: Zmieniamy sposób wyświetlania tła, by nie ucinało globu
            const heroImg = document.getElementById('moon-hero-img');
            heroImg.style.backgroundImage = `url('${data.heroImage}')`;
            heroImg.style.backgroundSize = 'contain';
            heroImg.style.backgroundRepeat = 'no-repeat';
            heroImg.style.backgroundPosition = 'center';

            // 2. Szybkie Statystyki
            const statsContainer = document.getElementById('moon-stats');
            statsContainer.innerHTML = ''; 
            if(data.quickStats) {
                data.quickStats.forEach(stat => {
                    statsContainer.innerHTML += `
                        <div class="stat-box">
                            <span class="stat-val">${stat.value}</span>
                            <span class="stat-lbl">${stat.label}</span>
                        </div>`;
                });
            }

            // 3. Orbita (Wizualizacja Graficzna + Dane liczbowe + Licznik)
            if(data.orbit) {
                const secOrbit = document.getElementById('sec-orbit');
                secOrbit.style.display = 'block';
                
                // Tworzenie brakującego kontenera wizualnego w locie
                let visualContainer = document.getElementById('orbit-visual-container');
                if (!visualContainer) {
                    visualContainer = document.createElement('div');
                    visualContainer.id = 'orbit-visual-container';
                    // Dodano 'position: relative', aby móc bezwzględnie pozycjonować licznik w prawym górnym rogu
                    visualContainer.style.cssText = 'position: relative; display: flex; justify-content: center; align-items: center; padding: 30px 20px; background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 25px;';
                    // Wstawienie przed statystykami
                    secOrbit.insertBefore(visualContainer, document.getElementById('content-orbit-metrics'));
                }
                
                let planetColor = '#e2e8f0'; 
                let planetName = 'Planeta';
                const tagLower = data.planetTag.toLowerCase();
                
                if (tagLower.includes('saturn')) {
                    planetColor = '#fde047';
                    planetName = 'Saturn';
                } else if (tagLower.includes('jowisz')) {
                    planetColor = '#fb923c';
                    planetName = 'Jowisz';
                } else if (tagLower.includes('ziemi')) {
                    planetColor = '#60a5fa';
                    planetName = 'Ziemia';
                } else if (tagLower.includes('mars')) {
                    planetColor = '#f87171';
                    planetName = 'Mars';
                } else if (tagLower.includes('neptun')) {
                    planetColor = '#3b82f6';
                    planetName = 'Neptun';
                } else if (tagLower.includes('uran')) {
                    planetColor = '#2dd4bf';
                    planetName = 'Uran';
                }

                // Skalowanie prędkości animacji bazując na dniach orbitalnych
                const duration = data.orbit.targetDays ? Math.max(4, Math.min(data.orbit.targetDays * 1.5, 25)) : 12;
                const durationMs = duration * 1000; // czas animacji w milisekundach
                const moonColor = data.themeColor || '#38bdf8';

                visualContainer.innerHTML = `
                    <!-- Dynamiczny licznik (style przeniesione inline) -->
                    <div id="live-orbit-timer" style="position: absolute; top: 15px; right: 15px; background-color: rgba(20, 27, 45, 0.85); border: 1px solid rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 6px; color: ${moonColor}; font-size: 0.9rem; font-weight: bold; z-index: 10; backdrop-filter: blur(4px);">0d 0h</div>

                    <svg width="240" height="240" viewBox="0 0 240 240" style="overflow: visible;">
                        <defs>
                            <linearGradient id="planetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="${planetColor}" />
                                <stop offset="100%" stop-color="#451a03" stop-opacity="0.7" />
                            </linearGradient>
                            <filter id="moonGlow" x="-30%" y="-30%" width="160%" height="160%">
                                <feGaussianBlur stdDeviation="3" result="blur" />
                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                            </filter>
                        </defs>
                        
                        <circle cx="120" cy="120" r="80" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="4 4" />
                        
                        <circle cx="120" cy="120" r="28" fill="url(#planetGrad)" style="box-shadow: 0 0 15px ${planetColor}40;" />
                        <text x="120" y="123" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle" style="font-family: system-ui, sans-serif; pointer-events: none; letter-spacing: 0.5px;">${planetName}</text>
                        
                        <g style="transform-origin: 120px 120px; animation: orbit-spin-anim ${duration}s linear infinite;">
                            <circle cx="120" cy="40" r="7" fill="${moonColor}" filter="url(#moonGlow)" />
                            <text x="120" y="26" font-size="10" fill="#ffffff" font-weight="600" text-anchor="middle" style="font-family: system-ui, sans-serif;">${data.name}</text>
                        </g>
                        
                        <style>
                            @keyframes orbit-spin-anim {
                                from { transform: rotate(0deg); }
                                to { transform: rotate(360deg); }
                            }
                        </style>
                    </svg>
                `;

                // Logika zliczająca dni i godziny w synchronizacji z ruchem księżyca
                const timerElement = document.getElementById("live-orbit-timer");
                if (timerElement && data.orbit.targetDays) {
                    const targetDays = data.orbit.targetDays;
                    const startTime = Date.now();

                    function updateOrbitTimer() {
                        const elapsedMs = (Date.now() - startTime) % durationMs;
                        const progressRatio = elapsedMs / durationMs;
                        
                        const currentTotalDays = progressRatio * targetDays;
                        const days = Math.floor(currentTotalDays);
                        const remainingHoursTotal = (currentTotalDays - days) * 24;
                        const hours = Math.floor(remainingHoursTotal);

                        timerElement.innerText = `${days}d ${hours}h`;
                        requestAnimationFrame(updateOrbitTimer);
                    }
                    requestAnimationFrame(updateOrbitTimer);
                }

                // Renderowanie kart ze statystykami liczbowymi
                const metricsContainer = document.getElementById('content-orbit-metrics');
                metricsContainer.innerHTML = data.orbit.metrics.map(m => `
                    <div class="card" style="text-align: center;">
                        <span style="display: block; font-size: 1.5rem; font-weight: bold; color: var(--main-color);">${m.value}</span>
                        <span style="color: var(--text-muted); font-size: 0.9rem;">${m.label}</span>
                    </div>
                `).join('');
                document.getElementById('content-orbit-summary').innerHTML = data.orbit.summaryText;
            }

            // 4. Profil szczegółowy
            renderFlexSection('sec-profile', 'title-profile', 'content-profile', 'Szczegółowy Profil', data.detailedProfile);

            // 5. Astrobiologia
            if(data.astrobiology) {
                document.getElementById('sec-astrobiology').style.display = 'block';
                document.getElementById('astro-stars').innerText = data.astrobiology.stars;
                document.getElementById('astro-desc').innerText = data.astrobiology.description;
            }

            // 6. Parametry fizyczne
            if(data.physicalParameters) {
                document.getElementById('sec-physical').style.display = 'block';
                const physContainer = document.getElementById('content-physical');
                physContainer.innerHTML = data.physicalParameters.map(p => `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 12px 0; color: var(--text-muted);">${p.label}</td>
                        <td style="padding: 12px 0; font-weight: bold; text-align: right;">${p.value}</td>
                    </tr>
                `).join('');
            }

            // 7. Geologia i Chemia
            if(data.geologyChemistry) {
                document.getElementById('sec-geology').style.display = 'block';
                const textContainer = document.getElementById('content-geology-text');
                textContainer.innerHTML = data.geologyChemistry.textBlocks.map(block => `
                    <div class="card">
                        <h3>${block.title}</h3>
                        <p style="color: var(--text-muted); line-height: 1.5; margin-bottom: 0;">${block.content}</p>
                    </div>
                `).join('');

                if(data.geologyChemistry.compositionChart) {
                    document.getElementById('geology-chart-title').innerText = data.geologyChemistry.compositionChart.title;
                    const legend = document.getElementById('geology-chart-legend');
                    legend.innerHTML = data.geologyChemistry.compositionChart.segments.map(seg => `
                        <li><strong style="color: var(--main-color);">${seg.percentage}</strong> - ${seg.text}</li>
                    `).join('');
                } else {
                    document.getElementById('content-geology-chart-container').style.display = 'none';
                }
            }

            // 8. Anomalie
            renderFlexSection('sec-anomalies', 'title-anomalies', 'content-anomalies', 'Anomalie Geologiczne', data.anomalies);

            // 9. Analiza porównawcza
            if(data.comparison) {
                document.getElementById('sec-comparison').style.display = 'block';
                document.getElementById('title-comparison').innerText = data.comparison.title;
                document.getElementById('subtitle-comparison').innerText = data.comparison.subtitle;
                document.getElementById('summary-comparison').innerHTML = `<strong>Podsumowanie:</strong> ${data.comparison.summaryBox}`;
                
                const compItems = document.getElementById('content-comparison-items');
                compItems.innerHTML = data.comparison.items.map(item => {
                    // POPRAWKA PASKA: Ograniczamy szerokość wizualnego paska do maksimum 100%
                    const numericVal = parseFloat(item.percentage);
                    const visualWidth = numericVal > 100 ? 100 : numericVal;

                    return `
                    <div style="margin-bottom: 15px;">
                        <div style="display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px;">
                            <span>${item.label}</span>
                            <span style="font-weight: bold; color: var(--main-color);">${item.percentage}</span>
                        </div>
                        <div style="width: 100%; background: rgba(255,255,255,0.05); height: 8px; border-radius: 4px; overflow: hidden;">
                            <div style="width: ${visualWidth}%; height: 100%; background: var(--main-color); border-radius: 4px;"></div>
                        </div>
                    </div>
                `}).join('');
            }

            // 10. Misje Kosmiczne
            if(data.missions) {
                document.getElementById('sec-missions').style.display = 'block';
                const missionsContainer = document.getElementById('content-missions');
                missionsContainer.innerHTML = data.missions.map(mission => `
                    <div class="card">
                        <h4 style="margin: 0 0 5px 0;">${mission.name}</h4>
                        <span style="font-size: 0.8rem; font-weight: bold; color: var(--main-color); text-transform: uppercase;">${mission.agency}</span>
                        <p style="color: var(--text-muted); line-height: 1.5; font-size: 0.9rem; margin-top: 10px;">${mission.description}</p>
                    </div>
                `).join('');
            }

            // 11. Główna Galeria
            const secGallery = document.getElementById('sec-gallery');
            if (data.gallery && data.gallery.length > 0) {
                secGallery.style.display = 'block';
                document.getElementById('title-gallery').innerText = data.galleryTitle || "Galeria zdjęć";
                const galContainer = document.getElementById('content-gallery');
                galContainer.innerHTML = '';
                data.gallery.forEach(imgUrl => {
                    galContainer.innerHTML += `<img src="${imgUrl}" alt="Zdjęcie obiektu">`;
                });
            }

            // Pokazanie załadowanego kontenera
            document.getElementById('main-container').style.opacity = '1';
        }

        // Uniwersalna funkcja do ładowania kafelków (Profil / Anomalie)
        function renderFlexSection(sectionId, titleId, contentId, titleText, itemsArray) {
            const section = document.getElementById(sectionId);
            if (itemsArray && itemsArray.length > 0) {
                section.style.display = 'block';
                document.getElementById(titleId).innerText = titleText;
                const container = document.getElementById(contentId);
                container.innerHTML = '';
                
                itemsArray.forEach(item => {
                    let subImagesHtml = '';
                    if (item.images && item.images.length > 0) {
                        subImagesHtml = `<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 8px; margin-top: 15px;">`;
                        item.images.forEach(img => {
                            subImagesHtml += `<img src="${img}" style="width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);">`;
                        });
                        subImagesHtml += `</div>`;
                    }

                    container.innerHTML += `
                        <div class="card">
                            <h3 style="margin-top:0;">${item.title}</h3>
                            <p style="color: var(--text-muted); line-height: 1.5; margin-bottom: 0; font-size: 0.95rem;">${item.content}</p>
                            ${subImagesHtml}
                        </div>`;
                });
            }
        }
    </script>
</body>
</html>
